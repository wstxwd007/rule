name: Sync and Compile All Rule Sets

on:
  schedule:
    - cron: "37 3 * * *"

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-sing-box-rules
  cancel-in-progress: false

jobs:
  sync-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download upstream rules
        shell: bash
        run: |
          set -euo pipefail

          TMP_DIR="$RUNNER_TEMP/upstream-rules"
          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR"

          curl -fL \
            --retry 3 \
            --retry-delay 2 \
            --connect-timeout 15 \
            --max-time 300 \
            -o "$TMP_DIR/proxy.json" \
            "https://github.com/DustinWin/ruleset_geodata/releases/download/sing-box-ruleset/proxy.json"

          curl -fL \
            --retry 3 \
            --retry-delay 2 \
            --connect-timeout 15 \
            --max-time 300 \
            -o "$TMP_DIR/fakeip-filter.json" \
            "https://github.com/DustinWin/ruleset_geodata/releases/download/sing-box-ruleset/fakeip-filter.json"

          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          tmp_dir = Path(os.environ["RUNNER_TEMP"]) / "upstream-rules"

          for filename in ("proxy.json", "fakeip-filter.json"):
              path = tmp_dir / filename

              with path.open("r", encoding="utf-8") as file:
                  data = json.load(file)

              if not isinstance(data, dict):
                  raise SystemExit(f"{filename}: 根结构不是 JSON 对象")

              if not isinstance(data.get("rules"), list):
                  raise SystemExit(f"{filename}: 缺少 rules 数组")

              data["version"] = 2

              with path.open("w", encoding="utf-8", newline="\n") as file:
                  json.dump(
                      data,
                      file,
                      ensure_ascii=False,
                      indent=2,
                  )
                  file.write("\n")

              print(
                  f"{filename}: version=2, "
                  f"rules={len(data['rules'])}"
              )
          PY

          if ! cmp -s "$TMP_DIR/proxy.json" proxy.json 2>/dev/null; then
            cp "$TMP_DIR/proxy.json" proxy.json
            echo "proxy.json updated"
          else
            echo "proxy.json unchanged"
          fi

          if ! cmp -s \
            "$TMP_DIR/fakeip-filter.json" \
            fakeip-filter.json 2>/dev/null; then
            cp "$TMP_DIR/fakeip-filter.json" fakeip-filter.json
            echo "fakeip-filter.json updated"
          else
            echo "fakeip-filter.json unchanged"
          fi

      - name: Find and normalize all rule-set JSON files
        shell: bash
        run: |
          set -euo pipefail

          RULE_LIST="$RUNNER_TEMP/ruleset-files.txt"
          export RULE_LIST

          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(".")
          output = Path(os.environ["RULE_LIST"])

          excluded_dirs = {
              ".git",
              "node_modules",
              "vendor",
              "dist",
              "build",
          }

          rule_files = []

          for path in sorted(root.rglob("*.json")):
              if any(part in excluded_dirs for part in path.parts):
                  continue

              try:
                  with path.open("r", encoding="utf-8") as file:
                      data = json.load(file)
              except (json.JSONDecodeError, UnicodeDecodeError):
                  print(f"跳过普通或无效 JSON：{path}")
                  continue

              # 只处理 sing-box 源规则集
              if not isinstance(data, dict):
                  continue

              if not isinstance(data.get("rules"), list):
                  continue

              old_version = data.get("version")
              data["version"] = 2

              with path.open("w", encoding="utf-8", newline="\n") as file:
                  json.dump(
                      data,
                      file,
                      ensure_ascii=False,
                      indent=2,
                  )
                  file.write("\n")

              rule_files.append(path.as_posix())

              print(
                  f"识别规则集：{path} "
                  f"version {old_version} -> 2，"
                  f"规则组数：{len(data['rules'])}"
              )

          if not rule_files:
              raise SystemExit("仓库中没有找到合法的 sing-box 规则集 JSON")

          output.write_text(
              "\n".join(rule_files) + "\n",
              encoding="utf-8",
          )

          print(f"共找到 {len(rule_files)} 个规则集 JSON")
          PY

          echo "准备编译以下文件："
          cat "$RULE_LIST"

      - name: Download sing-box compiler
        shell: bash
        run: |
          set -euo pipefail

          SING_BOX_VERSION="1.11.0"
          COMPILER_DIR="$RUNNER_TEMP/sing-box-compiler"

          rm -rf "$COMPILER_DIR"
          mkdir -p "$COMPILER_DIR"

          curl -fL \
            --retry 3 \
            --retry-delay 2 \
            --connect-timeout 15 \
            --max-time 300 \
            -o "$COMPILER_DIR/sing-box.tar.gz" \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"

          tar -xzf \
            "$COMPILER_DIR/sing-box.tar.gz" \
            -C "$COMPILER_DIR"

          SING_BOX_BIN="$(
            find "$COMPILER_DIR" \
              -type f \
              -name sing-box \
              -print \
              -quit
          )"

          if [ -z "$SING_BOX_BIN" ]; then
            echo "没有找到 sing-box 编译器"
            exit 1
          fi

          chmod +x "$SING_BOX_BIN"

          echo "SING_BOX_BIN=$SING_BOX_BIN" >> "$GITHUB_ENV"

          "$SING_BOX_BIN" version

      - name: Compile all rule sets
        shell: bash
        run: |
          set -euo pipefail

          RULE_LIST="$RUNNER_TEMP/ruleset-files.txt"

          while IFS= read -r json_file; do
            [ -n "$json_file" ] || continue

            srs_file="${json_file%.json}.srs"

            echo "----------------------------------------"
            echo "编译：$json_file"
            echo "输出：$srs_file"

            rm -f "$srs_file"

            "$SING_BOX_BIN" rule-set compile \
              --output "$srs_file" \
              "$json_file"

            if [ ! -s "$srs_file" ]; then
              echo "编译失败或输出文件为空：$srs_file"
              exit 1
            fi

            ls -lh "$json_file" "$srs_file"
          done < "$RULE_LIST"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          RULE_LIST="$RUNNER_TEMP/ruleset-files.txt"

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS= read -r json_file; do
            [ -n "$json_file" ] || continue

            srs_file="${json_file%.json}.srs"

            git add "$json_file" "$srs_file"
          done < "$RULE_LIST"

          if git diff --cached --quiet; then
            echo "所有 JSON 和 SRS 均无变化，不需要提交。"
            exit 0
          fi

          echo "即将提交以下变化："
          git diff --cached --stat

          git commit -m "Auto Sync: update and compile all rule sets"
          git push
